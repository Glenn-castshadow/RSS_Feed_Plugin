name: Build Plugin Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set package metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-manual}"
          version="${tag#v}"
          echo "slug=curated-rss-aggregator" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip=curated-rss-aggregator-$version.zip" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        shell: bash
        run: |
          slug="curated-rss-aggregator"
          staging="dist/$slug"
          mkdir -p "$staging"

          # Copy only the files that belong in the plugin.
          # Using an explicit list prevents stray dev artefacts (dist/, scripts/,
          # .github/, node_modules, etc.) from ending up inside the zip and being
          # mistaken for a second plugin by WordPress.
          for item in assets blocks includes README.md uninstall.php wordpress-rss-aggregator.php; do
            [ -e "$item" ] && cp -r "$item" "$staging/"
          done

          cd dist
          zip -r "${{ steps.meta.outputs.zip }}" "$slug"

          # Remove the staging folder so the artifact contains only the zip.
          rm -rf "$slug"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip }}
          path: dist/${{ steps.meta.outputs.zip }}

      - name: Attach zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.meta.outputs.zip }}
